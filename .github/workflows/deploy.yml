name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            echo "Connected"
            whoami
            pwd

            if [ ! -d ~/app ]; then
              echo "Cloning repo"
              git clone https://github.com/Imranbashir340/node-devops-project.git ~/app
            fi

            cd ~/app || exit 1

            echo "Pulling code"
            git pull origin main

            echo "Installing deps"
            npm install

            echo "Restarting app"
            pkill node || true

            nohup node index.js > output.log 2>&1 &
            echo "App started"